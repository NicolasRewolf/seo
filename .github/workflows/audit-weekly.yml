name: audit-weekly

# Weekly compute-findings job. Runs after snapshot-weekly so the latest data
# is available. Each call inserts a new audit_runs row + N audit_findings.
on:
  schedule:
    # Mondays 06:30 UTC — 30 min after snapshot-weekly so its writes land first.
    - cron: '30 6 * * 1'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_API_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          # The audit job doesn't hit GSC/GA4/Wix directly — it works off the
          # Supabase snapshots — but the per-section env loaders in lib/*
          # validate their bundle when imported, so we provide placeholders
          # for everything not strictly used here.
          GSC_OAUTH_CREDENTIALS_FILE: ./gsc-oauth-credentials.json
          GSC_TOKEN_FILE: ./gsc-token.json
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GA4_OAUTH_CREDENTIALS_FILE: ./gsc-oauth-credentials.json
          GA4_TOKEN_FILE: ./ga4-token.json
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
          WIX_SITE_ID: ${{ secrets.WIX_SITE_ID }}
          WIX_ACCOUNT_ID: ${{ secrets.WIX_ACCOUNT_ID }}
        run: npm run audit
