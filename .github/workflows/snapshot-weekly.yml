name: snapshot-weekly

# Weekly GSC + GA4 snapshot. The pipeline is idempotent (delete-before-insert
# on the period window) so triggering manually is safe.
on:
  schedule:
    # Mondays 06:00 UTC = 07:00 / 08:00 Paris depending on DST.
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # OAuth files are gitignored. The workflow recreates them at runtime
      # from secrets so the snapshot can authenticate against GSC + GA4.
      - name: Materialize OAuth files from secrets
        env:
          GSC_OAUTH_CREDENTIALS_JSON: ${{ secrets.GSC_OAUTH_CREDENTIALS_JSON }}
          GSC_TOKEN_JSON: ${{ secrets.GSC_TOKEN_JSON }}
          GA4_TOKEN_JSON: ${{ secrets.GA4_TOKEN_JSON }}
        run: |
          set -euo pipefail
          printf '%s' "$GSC_OAUTH_CREDENTIALS_JSON" > gsc-oauth-credentials.json
          printf '%s' "$GSC_TOKEN_JSON" > gsc-token.json
          printf '%s' "$GA4_TOKEN_JSON" > ga4-token.json
          # Sanity check: must be parseable JSON
          node -e "for (const f of ['gsc-oauth-credentials.json','gsc-token.json','ga4-token.json']) JSON.parse(require('fs').readFileSync(f,'utf8'))"

      - name: Run snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_API_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          GSC_OAUTH_CREDENTIALS_FILE: ./gsc-oauth-credentials.json
          GSC_TOKEN_FILE: ./gsc-token.json
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GA4_OAUTH_CREDENTIALS_FILE: ./gsc-oauth-credentials.json
          GA4_TOKEN_FILE: ./ga4-token.json
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
          WIX_SITE_ID: ${{ secrets.WIX_SITE_ID }}
          WIX_ACCOUNT_ID: ${{ secrets.WIX_ACCOUNT_ID }}
        run: npm run snapshot

      - name: Cleanup OAuth files
        if: always()
        run: rm -f gsc-oauth-credentials.json gsc-token.json ga4-token.json
